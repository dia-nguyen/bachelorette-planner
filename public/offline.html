<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline | Bachelorette Planner</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(145deg, #fff7fb, #ffe6f1);
        color: #3f0a25;
      }

      main {
        max-width: 28rem;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(63, 10, 37, 0.12);
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>
        Bachelorette Planner can still show previously cached trip data. Reconnect to sync the latest changes.
      </p>
    </main>
  </body>
</html>
